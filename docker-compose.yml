# docker-compose.yml
services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: unless-stopped

  ingestion-service:
    build: ./backend/ingestion-service
    container_name: ingestion-service
    environment:
      - MQTT_BROKER=mqtt-broker
      - REDIS_HOST=redis
    depends_on:
      - mqtt-broker
      - redis
    restart: unless-stopped

  fill-estimation-service:
    build: ./backend/fill-estimation-service
    container_name: fill-estimation-service
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
